<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 10</title>
</head>
<body>
    <form>
        <label>Nombre</label><br>
        <input type="text" name="nombre"><br><br>

        <input type="text" name="apellidos"><br><br>

        <label>Contraseña</label><br>

        <label>DNI</label><br>
        <input type="text" name="dni" size="8"><br><br>

        <label>Sexo</label><br>

        <input type="radio" name="sexo" value="mujer"> Mujer<br><br>

        <label>Incluir mi foto</label>
        <input type="file" name="foto"><br><br>

        <input type="checkbox" name="suscripcion">
        Suscribirme al boletín de novedadades<br><br>

        <input type="submit" value="Guardar cambios">
        <input type="reset" value="Borrar los datos introducidos">
    </form>

    <h2><strong>Rellena tu CV</strong></h2>
    <form>
        <fieldset>
            <legend>Datos personales</legend>
            <label>Provincia</label><br>
            <select name="provincia">
                <option>- selecciona -</option>
                <option>Buenos Aires</option>

                <option>Santa Fe</option>
                <option>Mendoza</option>
            </select><br><br>

            <label>Fecha de nacimiento</label><br>
            <input type="text" size="2"> de

            <select>
                <option>- selecciona -</option>
                <option>enero</option>
                <option>febrero</option>
                <option>marzo</option>
                <option>abril</option>
                <option>mayo</option>
                <option>junio</option>
                <option>julio</option>
                <option>agosto</option>
                <option>septiembre</option>
                <option>octubre</option>
                <option>noviembre</option>
                <option>diciembre</option>
            </select>
            
            de <input type="text" size="4"><br><br>

            <label>Temas de interés</label><br>
            <select multiple size="5">
                <option>Administración de bases de datos</option>
                <option>Análisis y programación</option>
                <option>Arquitectura</option>
                <option>Calidad</option>
                <option>ERP, CRM, Business Intelligence</option>
            </select>
